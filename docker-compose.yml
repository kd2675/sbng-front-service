services:
  sbng-front-service:
    container_name: sbng-front-service
    build:
      context: .
      dockerfile: Dockerfile
    image: sbng-front-service:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
